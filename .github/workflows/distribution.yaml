name: "Distribution"

# Generates the new merkle distribution for the liquidity hook (TWAB +
# breakdown + check) and commits data/last_merkle.json to main. The actual
# on-chain root submission is orchestrated by Maestro/Temporal via the
# `liquidity-hook-vm` pipeline (see backend-monorepo/packages/orchestrator).
#
# Triggered exclusively by Maestro (workflow_dispatch). Manual runs remain
# possible from the GitHub UI for debugging.

on:
  workflow_dispatch:
    inputs:
      dispatch_id:
        type: string
        description: "Unique ID for Temporal tracking"
        required: false
        default: ""

env:
  MORALIS_API_KEY: ${{ secrets.MORALIS_API_KEY }}
  MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
  WORKER_URL: ${{ secrets.WORKER_URL }}
  LENDING_WORKER_URL: ${{ secrets.LENDING_WORKER_URL }}

jobs:
  run-operation:
    runs-on: ubuntu-latest
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    steps:
      - name: "dispatch_id:${{ github.event.inputs.dispatch_id || 'manual' }}"
        if: always()
        run: echo "Temporal tracking"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "20.5.1"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.12.3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run merkle generation
        run: make -f automation/distribution.mk run-merkle
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY}}
          ROUTEMESH_API_KEY: ${{ secrets.ROUTEMESH_API_KEY }}

      - name: Auto-commit merkle data
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_user_name: GitHub Action Bot
          commit_user_email: action@github.com
          commit_author: GitHub Action Bot <action@github.com>

      - name: Write job result (success)
        if: success()
        run: |
          if [ "${{ steps.auto_commit.outputs.changes_detected }}" == "true" ]; then
            echo "✅ New merkle generated and committed"
            cat > /tmp/job_result.json <<EOF
          {"status":"executed","reason":"New merkle generated and committed","commitHash":"${{ steps.auto_commit.outputs.commit_hash }}"}
          EOF
          else
            echo "ℹ️ No merkle changes since last run"
            cat > /tmp/job_result.json <<EOF
          {"status":"noop","reason":"No merkle changes since last run"}
          EOF
          fi

      - name: Write job result (failure)
        if: failure()
        run: |
          echo "❌ Distribution pipeline failed"
          cat > /tmp/job_result.json <<EOF
          {"status":"error","reason":"Distribution pipeline failed (see logs)"}
          EOF

      - name: Clean up
        if: always()
        continue-on-error: true
        run: make -f automation/distribution.mk clean

      - name: Upload job result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-result
          path: /tmp/job_result.json
          if-no-files-found: ignore
          retention-days: 1
